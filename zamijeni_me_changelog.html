<header>
  <p class="header-eyebrow">Project Log</p>
  <h1>Zamijeni<span>Me</span></h1>
  <p class="header-sub">Shift swap &amp; day-off calendar for coffee shop teams</p>
  <div class="header-pills">
    <span class="pill">Started: 26 Jun 2026</span>
    <span class="pill" id="status-pill">Status: Planning</span>
    <span class="pill">Stack: HTML Artifact + Storage API</span>
    <span class="pill">Mobile-only</span>
  </div>
</header>

<div class="container">

  <div class="legend">
    <div class="legend-item"><span class="tag decision">Decision</span> Why it's this way</div>
    <div class="legend-item"><span class="tag scope">Scope</span> Features in/out</div>
    <div class="legend-item"><span class="tag ui">UI</span> Flow or interface</div>
    <div class="legend-item"><span class="tag fix">Fix</span> Bug or correction</div>
  </div>

  <div id="root"></div>

</div>

<footer>
  zamijeni me · project log · last updated <span id="last-updated"></span>
</footer>

<script>
  // ── Render engine — do not edit ──────────────────────────────

  function groupEntries(entries) {
    const phases = { plan: {}, build: {} };
    entries.forEach(e => {
      const p = e.phase;
      const v = e.version;
      if (!phases[p][v]) phases[p][v] = { date: e.versionDate || '', entries: [] };
      phases[p][v].entries.push(e);
    });
    return phases;
  }

  function renderTag(tag) {
    return `<span class="tag ${tag}">${tag}</span>`;
  }

  function renderEntry(e, phaseClass) {
    const why = e.why
      ? `<div class="why-block"><strong>Why:</strong> ${e.why}</div>`
      : '';
    return `
      <div class="entry">
        <div class="entry-header">
          <span class="entry-title">${e.title}</span>
          <div class="entry-meta">
            ${renderTag(e.tag)}
            <span class="entry-date">${e.date}</span>
          </div>
        </div>
        <div class="entry-body">${e.body}${why}</div>
      </div>`;
  }

  function renderPhase(phaseKey, label, versions) {
    const versionKeys = Object.keys(versions);
    if (phaseKey === 'build' && versionKeys.length === 0) {
      return `
        <div class="phase phase-build">
          <div class="phase-header">
            <span class="phase-badge build">Build</span>
            <span class="phase-title">${label}</span>
          </div>
          <div class="entry placeholder">
            <div class="entry-header">
              <span class="entry-title">Build log starts here once development begins</span>
              <div class="entry-meta"><span class="tag ui">UI</span><span class="entry-date">—</span></div>
            </div>
            <div class="entry-body">Entries will be added as Build 1, Build 1.1, Build 1.2 etc.</div>
          </div>
        </div>`;
    }

    let html = `<div class="phase phase-${phaseKey}">
      <div class="phase-header">
        <span class="phase-badge ${phaseKey}">${phaseKey.charAt(0).toUpperCase() + phaseKey.slice(1)}</span>
        <span class="phase-title">${label}</span>
      </div>`;

    versionKeys.forEach(v => {
      const vd = versions[v];
      const dateStr = vd.date ? ` · ${vd.date}` : '';
      html += `<div class="version-label">${v}${dateStr}</div>`;
      vd.entries.forEach(e => { html += renderEntry(e, phaseKey); });
    });

    html += `</div>`;
    return html;
  }

  function render() {
    const grouped = groupEntries(ENTRIES);
    const root = document.getElementById('root');
    root.innerHTML =
      renderPhase('plan',  'Planning &amp; Scope', grouped.plan) +
      renderPhase('build', 'Build Log',            grouped.build);

    // last updated = most recent entry date
    const lastEntry = ENTRIES[ENTRIES.length - 1];
    document.getElementById('last-updated').textContent = lastEntry.date;

    // status pill: switch to "Building" once any build entry exists
    const hasBuild = ENTRIES.some(e => e.phase === 'build');
    document.getElementById('status-pill').textContent =
      hasBuild ? 'Status: Building' : 'Status: Planning';
  }

  render();
</script>
